<title>Forza Horizon 6 Lista Auto</title>
<style>
  :root{
    --bg:#0e1116; --panel:#161b22; --panel2:#1c232d; --border:#2a3340;
    --text:#f2f5f8; --muted:#9aa7b4; --accent:#e10600; --accent2:#ff8a00;
    --row:#12171e; --rowAlt:#161c24; --rowHover:#202a36; --head:#11161c;
    --inputBg:#0c1014; --highlight:#3a2a00; --badge:#222c38;
  }
  html[data-theme="light"]{
    --bg:#f4f6f9; --panel:#ffffff; --panel2:#eef1f5; --border:#d4dae2;
    --text:#10141a; --muted:#5a6675; --accent:#e10600; --accent2:#c25e00;
    --row:#ffffff; --rowAlt:#f3f5f8; --rowHover:#e6ecf3; --head:#e9edf2;
    --inputBg:#ffffff; --highlight:#fff2cc; --badge:#e7ecf2;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--bg); color:var(--text);
    font-family:"Segoe UI",Roboto,Helvetica,Arial,sans-serif; font-size:14px;
  }
  header.top{
    padding:22px 20px 12px; text-align:center; position:relative;
    border-bottom:1px solid var(--border); background:var(--panel);
  }
  h1{
    margin:0; font-size:30px; letter-spacing:.5px; font-weight:800;
    text-transform:uppercase;
  }
  h1 .accent{color:var(--accent);}
  .updated{color:var(--muted); margin-top:6px; font-size:13px;}
  .top-right{ position:absolute; right:16px; top:16px; display:flex; gap:8px; align-items:flex-start; z-index:40; }
  .theme-toggle{
    cursor:pointer; background:var(--panel2); color:var(--text); border:1px solid var(--border);
    border-radius:20px; padding:7px 14px; font-size:13px; white-space:nowrap;
  }
  .theme-toggle:hover{border-color:var(--accent);}
  .lang-dd{ position:relative; }
  .lang-menu{
    position:absolute; right:0; top:calc(100% + 4px); min-width:84px;
    background:var(--panel2); border:1px solid var(--border); border-radius:10px;
    overflow:hidden; display:none;
  }
  .lang-menu.open{ display:block; }
  .lang-opt{ padding:8px 14px; cursor:pointer; font-size:13px; white-space:nowrap; }
  .lang-opt:hover{ background:var(--rowHover); }
  .flag{ width:20px; height:14px; vertical-align:-2px; border-radius:2px; margin-right:3px; box-shadow:0 0 0 1px rgba(0,0,0,.25); }

  .controls{
    max-width:1500px; margin:16px auto 0; padding:0 16px;
    display:flex; gap:12px; flex-wrap:wrap; align-items:center; justify-content:center;
  }
  .search-wrap{position:relative; flex:1 1 420px; max-width:640px;}
  #search{
    width:100%; padding:12px 40px 12px 40px; font-size:15px;
    background:var(--inputBg); color:var(--text);
    border:1px solid var(--border); border-radius:10px; outline:none;
  }
  #search:focus{border-color:var(--accent);}
  .search-wrap .ico{
    position:absolute; left:13px; top:50%; transform:translateY(-50%);
    color:var(--muted); font-size:16px;
  }
  .search-clear{
    position:absolute; right:10px; top:50%; transform:translateY(-50%);
    width:22px; height:22px; border-radius:50%; cursor:pointer; display:none;
    align-items:center; justify-content:center; color:var(--muted);
    font-size:15px; line-height:1; user-select:none;
  }
  .search-clear:hover{ background:var(--rowHover); color:var(--accent); }
  .search-clear.show{ display:flex; }
  .search-scope{
    position:absolute; right:40px; top:50%; transform:translateY(-50%);
    font-size:11px; color:var(--bg); background:var(--accent2);
    padding:3px 9px; border-radius:10px; font-weight:700; display:none;
  }
  .btn{
    cursor:pointer; background:var(--accent); color:#fff; border:none;
    border-radius:10px; padding:12px 18px; font-size:14px; font-weight:700;
    white-space:nowrap;
  }
  .btn:hover{filter:brightness(1.1);}
  .btn.secondary{background:var(--panel2); color:var(--text); border:1px solid var(--border);}
  .btn.secondary:hover{border-color:var(--accent);}

  .meta-line{
    max-width:1500px; margin:10px auto 0; padding:0 16px;
    color:var(--muted); font-size:12.5px; display:flex; gap:14px; flex-wrap:wrap; justify-content:center;
  }
  .meta-line b{color:var(--text);}

  .table-shell{
    max-width:1500px; margin:14px auto 40px; padding:0 16px;
  }
  .table-scroll{
    overflow-x:auto; border:1px solid var(--border); border-radius:12px;
    background:var(--panel);
  }
  table{border-collapse:collapse; width:100%; min-width:920px;}
  thead th{
    position:sticky; top:0; background:var(--head); z-index:2;
    text-align:left; padding:11px 12px; font-size:12.5px; letter-spacing:.4px;
    text-transform:uppercase; color:var(--muted); white-space:nowrap;
    border-bottom:2px solid var(--border); cursor:pointer; user-select:none;
  }
  thead th:hover{color:var(--text);}
  thead th.col-active{color:var(--accent2);}
  thead th .arrow{font-size:10px; margin-left:4px; opacity:.85;}
  thead th.highlight-col{background:var(--accent); color:#fff;}
  tbody td{
    padding:9px 10px; border-bottom:1px solid var(--border);
    white-space:normal; vertical-align:middle;
  }
  tbody td.col-name{min-width:170px;}
  /* colonne che restano su una riga */
  thead th[data-key="make"], tbody td.col-make,
  thead th[data-key="country"], thead th[data-key="cls"]{ white-space:nowrap; }
  thead th[data-key="year"], tbody td.col-year{ white-space:nowrap; text-align:center; }
  tbody tr:nth-child(even){background:var(--rowAlt);}
  tbody tr:nth-child(odd){background:var(--row);}
  tbody tr:hover{background:var(--rowHover);}
  td.cell-highlight{background:var(--highlight) !important;}

  .badge{
    display:inline-block; padding:2px 8px; border-radius:6px; font-size:11.5px;
    font-weight:700; background:var(--badge); color:var(--text);
  }
  .cls{display:inline-flex; align-items:center; gap:7px;}
  .cls .tag, .brand-item .tag{padding:2px 8px; border-radius:6px; font-weight:800; font-size:11.5px; color:#fff; display:inline-block;}
  .cls .pi{color:var(--muted); font-variant-numeric:tabular-nums;}
  .cD{background:#5a6675;} .cC{background:#c79a17;} .cB{background:#e67e22;}
  .cA{background:#d63a2f;} .cS1{background:#7b3fe4;} .cS2{background:#2f7be4;}
  .cR{background:#10a37f;} .cX{background:#111;}

  .price-input{
    width:100px; padding:6px 6px; font-size:13px; text-align:right;
    background:var(--inputBg); color:var(--text);
    border:1px solid var(--border); border-radius:7px;
    font-variant-numeric:tabular-nums;
  }
  .price-input:focus{outline:none; border-color:var(--accent2);}
  .price-input.has-val{color:var(--accent2); font-weight:700;}
  thead th[data-key="price"], thead th[data-key="priceDisc"]{ text-align:right; }
  tbody td.col-price{ text-align:right; white-space:nowrap; }
  .price-val{ color:var(--accent2); font-weight:700; font-variant-numeric:tabular-nums; }

  /* Brand popup */
  .overlay{
    position:fixed; inset:0; background:rgba(0,0,0,.55);
    display:none; align-items:flex-start; justify-content:center; z-index:50; padding:40px 16px;
    overflow:auto;
  }
  .overlay.open{display:flex;}
  .popup{
    background:var(--panel); border:1px solid var(--border); border-radius:14px;
    width:min(95vw,1200px); padding:18px 20px 22px;
    box-shadow:0 20px 60px rgba(0,0,0,.5);
  }
  .popup h3{margin:0 0 4px; font-size:18px;}
  .popup .hint{color:var(--muted); font-size:12.5px; margin-bottom:14px;}
  .popup .close-x{float:right; cursor:pointer; color:var(--muted); font-size:22px; line-height:1;}
  .popup .close-x:hover{color:var(--accent);}
  .brand-grid-scroll{ max-width:100%; }
  .brand-grid{
    column-width:175px; column-gap:18px;
  }
  .brand-item{
    cursor:pointer; padding:6px 10px; border-radius:7px; font-size:13px;
    border:1px solid transparent; white-space:nowrap;
    break-inside:avoid; -webkit-column-break-inside:avoid;
  }
  .brand-item:hover{background:var(--rowHover); border-color:var(--accent);}
  .brand-item .cnt{color:var(--muted); font-size:11px; margin-left:5px;}
  .brand-item.all{font-weight:800; color:var(--accent2);}
  .empty{padding:30px; text-align:center; color:var(--muted);}
  @media (max-width:600px){
    h1{font-size:22px;}
  }
</style>

      <tbody id="tbody"></tbody>
    </table>
  </div>

</div>

<!-- Brand popup -->
<div class="overlay" id="brandOverlay">

</div>

const PRICE_KEY = 'fh6_prices_v1';

function parseClass(s){
  // es. "734 S1" -> {pi:734, cls:'S1'}
  const m = s.trim().match(/^(\d+)\s+(\S+)$/);
  if(m) return { pi: parseInt(m[1],10), cls: m[2] };
  return { pi: 0, cls: s.trim() };
}

const cars = RAW.split('\n')
  .map(l => l.trim())
  .filter(l => l.length)
  .map((line, i) => {
    const f = line.split('|');
    const c = parseClass(f[3] || '');
    const fullName = f[1]||'';
    const ym = fullName.match(/^((?:19|20)\d\d|2554)\s+/);   // anno davanti al nome
    const year = ym ? ym[1] : '';
    const nameClean = ym ? fullName.slice(ym[0].length) : fullName;
    return {

/* normalizza: minuscolo + senza accenti (così "retro" trova "Rétro"/"Rètro") */
const na = s => String(s).normalize('NFD').replace(/[̀-ͯ]/g,'').toLowerCase();

/* traduce il valore Collezione (separato da virgole) nella lingua corrente */
function collDisplay(car){
  if(lang==='en' || !car.collection) return car.collection;
  const map=I18N.it.coll;
  return car.collection.split(',').map(part=>{
    const p=part.trim(), low=p.toLowerCase();
    if(map[low]) return map[low];
    for(const en in map){ if(low.startsWith(en)) return map[en]+p.slice(en.length); }
    return p;
  }).join(', ');
}

/* traduce un valore Tipo nella lingua corrente */
function typeName(t){ const m=I18N.it.types; return (lang==='it' && m[t]) ? m[t] : t; }
function typeDisplay(car){ return typeName(car.type); }

let state = {
  sortKey: 'make',
  sortDir: 1,        // 1 asc, -1 desc
  brand: null,       // filtro marca attivo
  type: null,        // filtro tipo attivo
  cls: null,         // filtro classe attivo
  country: null,     // filtro nazione attivo
  decade: null,      // filtro decade attivo (anno iniziale, es. 1990)
  query: '',
  searchCol: null    // colonna auto-rilevata dalla ricerca
};

/* valori distinti per auto-detect ricerca */
const distinct = {
  make: new Set(cars.map(c=>na(c.make))),
  type: new Set(),
  cls: new Set(cars.map(c=>na(c.cls))),
  country: new Set(cars.map(c=>na(c.country))),
  collection: new Set(),
  dlc: new Set(cars.filter(c=>c.dlc).map(c=>na(c.dlc)))
};
function rebuildDistinct(){
  distinct.collection = new Set();
  distinct.type = new Set();
  cars.forEach(c => {
    collDisplay(c).split(',').forEach(p => { const v=na(p.trim()); if(v) distinct.collection.add(v); });
    distinct.type.add(na(typeName(c.type)));
  });
}
rebuildDistinct();

/* rileva quale colonna corrisponde meglio alla query */
function detectColumn(q){
  q = na(q.trim());
  if(!q) return null;
  const anyHas = set => [...set].some(v => v.includes(q));
  // priorità: classe esatta, poi marca, nazione, tipo, collezione, dlc
  if(CLASS_ORDER[q.toUpperCase()] || anyHas(distinct.cls)) return 'cls';
  if(distinct.make.has(q) || anyHas(distinct.make)) return 'make';
  if(distinct.country.has(q) || anyHas(distinct.country)) return 'country';
  if(anyHas(distinct.type)) return 'type';
  if(anyHas(distinct.collection)) return 'collection';
  if(anyHas(distinct.dlc)) return 'dlc';
  return null; // ricade su Nome+Marca
}

function carField(car, col){
  switch(col){
    case 'make': return car.make;
    case 'name': return car.nameClean;
    case 'year': return car.year;
    case 'type': return typeDisplay(car);
    case 'cls': return car.classFull;
    case 'country': return car.country;
    case 'collection': return collDisplay(car);
    case 'dlc': return car.dlc;
    default: return '';
  }
}

function matchesQuery(car, q, col){
  q = na(q);
  if(col && col !== 'name'){
    return na(carField(car, col)).includes(q);
  }
  // fallback: cerca su nome + marca
  return na(car.name).includes(q) || na(car.make).includes(q);
}

/* ======================= RENDER ======================= */
const tbody = document.getElementById('tbody');
const emptyMsg = document.getElementById('emptyMsg');

function compare(a, b){
  const k = state.sortKey, d = state.sortDir;
  let av, bv;
  if(k === 'cls'){ av=CLASS_ORDER[a.cls]||99; bv=CLASS_ORDER[b.cls]||99; if(av===bv){ av=a.pi; bv=b.pi; } }
  else if(k === 'year'){
    av = a.year ? +a.year : null; bv = b.year ? +b.year : null;
    if(av==null && bv==null) return a.make.localeCompare(b.make);
    if(av==null) return 1;
    if(bv==null) return -1;
  }
  else if(k === 'price' || k === 'priceDisc'){
    av = getPrice(a, k); bv = getPrice(b, k);
    // valori vuoti sempre in fondo
    if(av==null && bv==null) return a.make.localeCompare(b.make);
    if(av==null) return 1;
    if(bv==null) return -1;
  }
  else { av = carField(a,k).toLowerCase(); bv = carField(b,k).toLowerCase(); }
  if(av < bv) return -1*d;
  if(av > bv) return 1*d;
  // tie-break stabile: marca poi nome
  return (a.make+a.name).localeCompare(b.make+b.name);
}

function fmt(n){ return n==null ? '' : Number(n).toLocaleString('it-IT'); }

function render(){
  let rows = cars.slice();
  if(state.brand) rows = rows.filter(c => c.make === state.brand);
  if(state.type) rows = rows.filter(c => c.type === state.type);
  if(state.cls) rows = rows.filter(c => c.cls === state.cls);
  if(state.country) rows = rows.filter(c => c.country === state.country);
  if(state.decade != null) rows = rows.filter(c => c.year && +c.year >= state.decade && +c.year < state.decade+10);
  if(state.query){
    const col = state.searchCol;
    rows = rows.filter(c => matchesQuery(c, state.query, col));
  }
  rows.sort(compare);

  // intestazioni: indicatore sort + colonna evidenziata da ricerca
  document.querySelectorAll('#headRow th').forEach(th => {
    const key = th.dataset.key;
    th.classList.toggle('col-active', key === state.sortKey);
    th.classList.toggle('highlight-col', !!state.query && key === state.searchCol);
    const base = I18N[lang].cols[key];
    const arrow = key === state.sortKey ? (state.sortDir===1?' ▲':' ▼') : '';
    th.innerHTML = base + (arrow ? '<span class="arrow">'+arrow+'</span>' : '');
  });

  tbody.innerHTML = '';
  const frag = document.createDocumentFragment();
  rows.forEach(car => {
    const tr = document.createElement('tr');
    const hq = state.query.toLowerCase();
    const hl = col => (state.query && state.searchCol===col) ? ' cell-highlight' : '';

    tr.innerHTML =
      '<td class="col-make'+hl('make')+'"><b>'+esc(car.make)+'</b></td>'+
      '<td class="col-name'+hl('name')+'">'+esc(car.nameClean)+'</td>'+
      '<td class="col-year'+hl('year')+'">'+(car.year?esc(car.year):'<span class="pi">—</span>')+'</td>'+
      '<td class="'+hl('type')+'">'+esc(typeDisplay(car))+'</td>'+
      '<td class="'+hl('cls')+'"><span class="cls"><span class="tag c'+clsClass(car.cls)+'">'+esc(car.cls)+'</span><span class="pi">'+car.pi+'</span></span></td>'+
      '<td class="'+hl('country')+'">'+esc(car.country)+'</td>'+
      '<td class="'+hl('collection')+'">'+esc(collDisplay(car))+'</td>'+
      '<td class="'+hl('dlc')+'">'+(car.dlc?'<span class="badge">'+esc(car.dlc)+'</span>':'<span class="pi">—</span>')+'</td>'+
      '<td class="col-price'+hl('price')+'">'+priceText(car,'price')+'</td>'+
      '<td class="col-price'+hl('priceDisc')+'">'+priceText(car,'priceDisc')+'</td>';

    frag.appendChild(tr);
  });
  tbody.appendChild(frag);

  document.getElementById('metaCount').innerHTML = I18N[lang].shown(rows.length, cars.length);
  emptyMsg.style.display = rows.length ? 'none' : 'block';

  // riga filtro attivo
  const af = document.getElementById('activeFilter');
  let parts = [];
  if(state.brand) parts.push(I18N[lang].fMake+': <b>'+esc(state.brand)+'</b>');
  if(state.type) parts.push(I18N[lang].fType+': <b>'+esc(typeName(state.type))+'</b>');
  if(state.cls) parts.push(I18N[lang].fClass+': <b>'+esc(state.cls)+'</b>');
  if(state.country) parts.push(I18N[lang].fCountry+': <b>'+esc(state.country)+'</b>');
  if(state.decade != null) parts.push(I18N[lang].fYear+': <b>'+decadeLabel(state.decade)+'</b>');
  if(state.query && state.searchCol) parts.push(I18N[lang].fInCol+': <b>'+I18N[lang].cols[state.searchCol]+'</b>');
  else if(state.query) parts.push(I18N[lang].fSearch+': <b>'+esc(state.query)+'</b>');
  af.innerHTML = parts.join(' • ');
}

function priceInput(car, which){
  const inp = document.createElement('input');
  inp.type = 'text';
  inp.className = 'price-input';
  inp.inputMode = 'numeric';
  inp.placeholder = '—';
  const v = getPrice(car, which);
  if(v != null){ inp.value = fmt(v); inp.classList.add('has-val'); }
  inp.title = which==='priceDisc' ? 'Prezzo scontato (con bonus case)' : 'Prezzo autosalone (CR)';
  inp.addEventListener('focus', () => { const raw=getPrice(car,which); inp.value = raw!=null?raw:''; });
  inp.addEventListener('blur', () => {
    const num = parseInt(inp.value.replace(/[^\d]/g,''),10);
    if(isNaN(num)){ setPrice(car,which,null); inp.value=''; inp.classList.remove('has-val'); }
    else { setPrice(car,which,num); inp.value=fmt(num); inp.classList.add('has-val'); }
  });
  inp.addEventListener('keydown', e => { if(e.key==='Enter') inp.blur(); });
  return inp;
}

function clsClass(c){ return ['D','C','B','A','S1','S2','R','X'].includes(c) ? c : 'D'; }
function esc(s){ return String(s).replace(/[&<>"]/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[ch])); }

function decadeLabel(d){ return String(d%100).padStart(2,'0')+"'"; }   // 1990 -> "90'", 2000 -> "00'"
function buildPicker(kind){
  const T = I18N[lang];
  const titles = {brand:T.popupTitle, type:T.pickTypeTitle, cls:T.pickClassTitle, country:T.pickCountryTitle, decade:T.pickYearTitle};
  const hints  = {brand:T.popupHint,  type:T.pickTypeHint,  cls:T.pickClassHint,  country:T.pickCountryHint, decade:T.pickYearHint};
  const alls   = {brand:T.allMakes,   type:T.allTypes,      cls:T.allClasses,     country:T.allCountries,    decade:T.allYears};
  document.getElementById('popupTitle').textContent = titles[kind];
  document.getElementById('popupHint').textContent  = hints[kind];
  brandGrid.innerHTML='';
  const choose = key => { if(kind==='brand')state.brand=key; else if(kind==='type')state.type=key; else if(kind==='cls')state.cls=key; else if(kind==='country')state.country=key; else state.decade=key; overlay.classList.remove('open'); render(); };
  const all = document.createElement('div');
  all.className='brand-item all';
  all.innerHTML=alls[kind]+' <span class="cnt">'+cars.length+'</span>';
  all.addEventListener('click', ()=>choose(null));
  brandGrid.appendChild(all);
  let items=[];
  if(kind==='brand'){
    const c={}; cars.forEach(x=>c[x.make]=(c[x.make]||0)+1);
    items = Object.keys(c).sort((a,b)=>a.localeCompare(b)).map(k=>({key:k,label:esc(k),cnt:c[k]}));
  } else if(kind==='type'){
    const c={}; cars.forEach(x=>c[x.type]=(c[x.type]||0)+1);
    items = Object.keys(c).map(k=>({key:k,label:esc(typeName(k)),cnt:c[k],sort:typeName(k).toLowerCase()})).sort((a,b)=>a.sort.localeCompare(b.sort));
  } else if(kind==='country'){
    const c={}; cars.forEach(x=>c[x.country]=(c[x.country]||0)+1);
    items = Object.keys(c).sort((a,b)=>a.localeCompare(b)).map(k=>({key:k,label:esc(k),cnt:c[k]}));
  } else if(kind==='decade'){
    const c={}; cars.forEach(x=>{ if(!x.year)return; const dec=Math.floor(+x.year/10)*10; if(dec>=1930&&dec<=2020) c[dec]=(c[dec]||0)+1; });
    items = Object.keys(c).map(Number).sort((a,b)=>a-b).map(k=>({key:k,label:decadeLabel(k),cnt:c[k]}));
  } else {
    const order=['D','C','B','A','S1','S2','R','X']; const c={}; cars.forEach(x=>c[x.cls]=(c[x.cls]||0)+1);
    items = order.filter(k=>c[k]).map(k=>({key:k,label:'<span class="tag c'+clsClass(k)+'">'+k+'</span>',cnt:c[k]}));
  }
  items.forEach(it=>{
    const d=document.createElement('div'); d.className='brand-item';
    d.innerHTML=it.label+'<span class="cnt">'+it.cnt+'</span>';
    d.addEventListener('click', ()=>choose(it.key));
    brandGrid.appendChild(d);
  });
}

function flagHTML(code){
  if(code==='it') return '<svg class="flag" viewBox="0 0 3 2"><rect width="1" height="2" fill="#009246"/><rect x="1" width="1" height="2" fill="#fff"/><rect x="2" width="1" height="2" fill="#ce2b37"/></svg>';
  return '<svg class="flag" viewBox="0 0 60 30"><rect width="60" height="30" fill="#012169"/><path d="M0,0 L60,30 M60,0 L0,30" stroke="#fff" stroke-width="6"/><path d="M0,0 L60,30 M60,0 L0,30" stroke="#C8102E" stroke-width="3"/><rect x="25" width="10" height="30" fill="#fff"/><rect y="10" width="60" height="10" fill="#fff"/><rect x="27" width="6" height="30" fill="#C8102E"/><rect y="12" width="60" height="6" fill="#C8102E"/></svg>';
}
function langLabel(code){ return flagHTML(code)+' '+(code==='it'?'IT':'EN'); }
function applyLang(l){
  lang = l; localStorage.setItem('fh6_lang', l);
  const T = I18N[l];
  document.getElementById('titleSub').textContent = T.titleSub;
  document.getElementById('updatedTxt').textContent = T.updated + ' 19 May 2026';
  searchEl.placeholder = T.searchPh;
  document.getElementById('brandBtn').textContent = T.brandBtn;
  document.getElementById('typeBtn').textContent = T.typeBtn;
  document.getElementById('classBtn').textContent = T.classBtn;
  document.getElementById('countryBtn').textContent = T.countryBtn;
  document.getElementById('yearBtn').textContent = T.yearBtn;
  document.getElementById('resetBtn').textContent = T.reset;
  document.getElementById('metaInfo').textContent = T.info;
  emptyMsg.textContent = T.empty;
  document.getElementById('popupTitle').textContent = T.popupTitle;
  document.getElementById('popupHint').textContent = T.popupHint;
  langBtn.innerHTML = langLabel(l) + ' ▾';
  langMenu.innerHTML = '';
  const other = l==='it' ? 'en' : 'it';
  const opt = document.createElement('div');
  opt.className = 'lang-opt';
  opt.innerHTML = langLabel(other);
  opt.addEventListener('click', e => { e.stopPropagation(); langMenu.classList.remove('open'); applyLang(other); });
  langMenu.appendChild(opt);
  applyTheme(document.documentElement.getAttribute('data-theme') || 'dark'); // testo tema nella lingua giusta
  rebuildDistinct();
  state.searchCol = detectColumn(state.query);
  if(state.query && state.searchCol){ scopeEl.style.display='block'; scopeEl.textContent = T.cols[state.searchCol]; } else { scopeEl.style.display='none'; }
  render();
}
langBtn.addEventListener('click', e => { e.stopPropagation(); langMenu.classList.toggle('open'); });
document.addEventListener('click', () => langMenu.classList.remove('open'));

// init
applyTheme(localStorage.getItem('fh6_theme') || 'dark');
applyLang(lang);
</script>
</body>
</html>
